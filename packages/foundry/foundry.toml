[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.foundry]
  profile = "core"

[rpc_endpoints]
base = "${BASE_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }

[profile.ci]
fuzz_runs = 10000
